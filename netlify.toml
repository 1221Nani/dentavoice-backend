[build]
  publish = "website"

# ── Security headers on every response ─────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options             = "SAMEORIGIN"
    X-Content-Type-Options      = "nosniff"
    X-XSS-Protection            = "1; mode=block"
    Referrer-Policy             = "strict-origin-when-cross-origin"
    Permissions-Policy          = "camera=(), microphone=(self), geolocation=()"

# Cache static assets aggressively, never cache HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirects ───────────────────────────────────────────────────────────────

# Clean URL for privacy page
[[redirects]]
  from   = "/privacy"
  to     = "/privacy.html"
  status = 200

# Agent dashboard doesn't exist yet — redirect to contact
[[redirects]]
  from   = "/agents"
  to     = "/#contact"
  status = 301

[[redirects]]
  from   = "/agents.html"
  to     = "/#contact"
  status = 301

# Any other missing page → back to home (preserves good SEO signal)
[[redirects]]
  from   = "/*"
  to     = "/"
  status = 404
